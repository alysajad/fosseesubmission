services:
  - type: web
    name: fossee-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn workshop_portal.wsgi:application"
    envVars:
      - key: DB_ENGINE
        value: sqlite3
      - key: DB_NAME
        value: db.sqlite3
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
